# radio.munister.com.ua → проксі на локальний gunicorn (Radio Vinnipeg Nights)
#
# Встановлення:
#   sudo cp deploy/nginx-radio.conf /etc/nginx/conf.d/radio.munister.com.ua.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d radio.munister.com.ua

server {
    listen 80;
    server_name radio.munister.com.ua;

    location / {
        proxy_pass          http://127.0.0.1:5060;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_redirect      off;
    }
}
