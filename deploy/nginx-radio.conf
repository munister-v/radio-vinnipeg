# radio.munister.com.ua → проксі на локальний gunicorn (Winnipeg Nights)
#
# Початкове встановлення (до сертифіката):
#   sudo cp deploy/nginx-radio.conf /etc/nginx/conf.d/radio.munister.com.ua.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d radio.munister.com.ua
#
# Нижче — фінальна версія після certbot (HTTPS + редірект з 80).

server {
    server_name radio.munister.com.ua;

    location / {
        proxy_pass          http://127.0.0.1:5060;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_redirect      off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/radio.munister.com.ua/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/radio.munister.com.ua/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = radio.munister.com.ua) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name radio.munister.com.ua;
    return 404; # managed by Certbot
}
